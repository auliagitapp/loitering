<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loitering Detection banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#11161d"/>
    </linearGradient>
    <linearGradient id="redfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dc1f2e" stop-opacity="0"/>
      <stop offset="1" stop-color="#dc1f2e" stop-opacity="0.9"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1b2530" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- corner CCTV brackets -->
  <g stroke="#2b3a47" stroke-width="2" fill="none">
    <path d="M24 24 h34 M24 24 v34"/>
    <path d="M1176 24 h-34 M1176 24 v34"/>
    <path d="M24 296 h34 M24 296 v-34"/>
    <path d="M1176 296 h-34 M1176 296 v-34"/>
  </g>

  <!-- REC dot -->
  <g transform="translate(40,52)">
    <circle cx="0" cy="0" r="6" fill="#dc1f2e"/>
    <text x="16" y="5" font-family="'Courier New',monospace" font-size="15" letter-spacing="2" fill="#8aa0b2">REC · CAM 66</text>
  </g>

  <!-- title -->
  <text x="40" y="150" font-family="'Courier New',monospace" font-size="62" font-weight="bold" letter-spacing="1" fill="#eef3f8">LOITERING</text>
  <text x="40" y="206" font-family="'Courier New',monospace" font-size="62" font-weight="bold" letter-spacing="1" fill="#3fb950">DETECTION<tspan fill="#dc1f2e">_</tspan></text>

  <!-- subtitle -->
  <text x="44" y="246" font-family="'Courier New',monospace" font-size="17" letter-spacing="0.5" fill="#8aa0b2">Rule-based pacing detection  ·  YOLOv8  +  ByteTrack</text>

  <!-- legend -->
  <g font-family="'Courier New',monospace" font-size="13" letter-spacing="1">
    <circle cx="48" cy="282" r="5" fill="#3fb950"/><text x="60" y="287" fill="#6e8398">NORMAL</text>
    <circle cx="158" cy="282" r="5" fill="#e3873a"/><text x="170" y="287" fill="#6e8398">WARNING</text>
    <circle cx="278" cy="282" r="5" fill="#dc1f2e"/><text x="290" y="287" fill="#6e8398">LOITERING</text>
  </g>

  <!-- right scene: oscillating pacing trajectory inside a tracked bbox -->
  <g transform="translate(820,40)">
    <!-- bounding box (loitering = red) -->
    <rect x="60" y="20" width="240" height="240" fill="none" stroke="#dc1f2e" stroke-width="3"/>
    <rect x="60" y="-2" width="118" height="22" fill="#dc1f2e"/>
    <text x="68" y="14" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#0b0f14">ID:66  PACING</text>

    <!-- oscillating path (mondar-mandir) -->
    <path d="M90 200 C 140 110, 220 110, 270 200 S 360 290, 270 140"
          fill="none" stroke="url(#redfade)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M90 150 q 45 -55 90 0 t 90 0 t 90 0"
          fill="none" stroke="#dc1f2e" stroke-width="3" stroke-linecap="round"/>
    <!-- direction arrows -->
    <path d="M120 150 l -12 -6 l 0 12 z" fill="#dc1f2e"/>
    <path d="M260 150 l 12 6 l 0 -12 z" fill="#dc1f2e"/>

    <!-- simple figure -->
    <g fill="#9fb3c4">
      <circle cx="180" cy="120" r="14"/>
      <rect x="170" y="138" width="20" height="56" rx="6"/>
    </g>
  </g>

  <!-- prototype tag -->
  <g transform="translate(1040,278)">
    <rect x="0" y="-16" width="120" height="24" rx="4" fill="#1b2530" stroke="#2b3a47"/>
    <text x="60" y="1" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" letter-spacing="2" fill="#e3873a">PROTOTYPE</text>
  </g>
</svg>
